name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write
  security-events: write

jobs:
  validate:
    name: Validate Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - id: ver
        name: Extract and validate version
        run: |
          TAG_VER="${GITHUB_REF_NAME#v}"
          INIT_VER=$(python -c "import re; print(re.search(r'__version__\s*=\s*\"([\d.]+)\"', open('src/cortexdb/__init__.py').read()).group(1))")
          echo "Tag: $TAG_VER, Code: $INIT_VER"
          if [ "$TAG_VER" != "$INIT_VER" ]; then
            echo "ERROR: Tag version ($TAG_VER) does not match code version ($INIT_VER)"
            exit 1
          fi
          echo "version=$TAG_VER" >> "$GITHUB_OUTPUT"

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev]"
      - run: pytest tests/ -x --tb=short -q

  build-dashboard:
    name: Build Dashboard
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json
      - run: cd dashboard && npm ci && npx next build

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [validate, test, build-dashboard]
    steps:
      - uses: actions/checkout@v4
      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          # Extract section between this version header and the next ---
          NOTES=$(sed -n "/## \[$VERSION\]/,/^---$/p" CHANGELOG.md | head -n -1)
          echo "notes<<EOF" >> "$GITHUB_OUTPUT"
          echo "$NOTES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
      - uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.notes }}
          generate_release_notes: false

  docker:
    name: Docker Push
    runs-on: ubuntu-latest
    needs: [validate, test, build-dashboard]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ needs.validate.outputs.version }}
            ghcr.io/${{ github.repository }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ github.repository }}:${{ needs.validate.outputs.version }}
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Generate SBOM with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ github.repository }}:${{ needs.validate.outputs.version }}
          format: cyclonedx
          output: sbom.cdx.json
        continue-on-error: true

      - name: Upload SBOM as release artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ needs.validate.outputs.version }}
          path: sbom.cdx.json
          retention-days: 90
        continue-on-error: true

      - name: Push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ needs.validate.outputs.version }}
            ghcr.io/${{ github.repository }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
