# ============================================================
# CortexDB - Nginx Reverse Proxy Configuration
# HTTPS/TLS termination, rate limiting, security headers
# (c) 2026 Nirlab Inc. All Rights Reserved.
# ============================================================

# ---------- Rate Limiting Zones ----------
# API endpoints: 10 requests/second per IP
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
# Static/dashboard: 30 requests/second per IP
limit_req_zone $binary_remote_addr zone=static_limit:10m rate=30r/s;

# ---------- Connection Limiting ----------
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# ---------- Upstream Definitions ----------
upstream cortex_router {
    server cortex-router:5400;
    keepalive 32;
}

upstream cortex_dashboard {
    server cortex-dashboard:3000;
    keepalive 16;
}

# ---------- Gzip Compression ----------
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_min_length 1024;
gzip_types
    text/plain
    text/css
    text/xml
    text/javascript
    application/json
    application/javascript
    application/xml
    application/xml+rss
    application/x-javascript
    image/svg+xml;

# ---------- SSL Session Caching ----------
ssl_session_cache shared:SSL:10m;
ssl_session_timeout 1d;
ssl_session_tickets off;

# ---------- SSL Configuration ----------
# Certificate paths — override via environment or mount
ssl_certificate /etc/nginx/ssl/cortexdb.crt;
ssl_certificate_key /etc/nginx/ssl/cortexdb.key;
ssl_dhparam /etc/nginx/ssl/dhparam.pem;

# TLS 1.2+ only — no legacy protocols
ssl_protocols TLSv1.2 TLSv1.3;
ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
ssl_prefer_server_ciphers off;

# OCSP Stapling (enable when using real certificates)
# ssl_stapling on;
# ssl_stapling_verify on;
# ssl_trusted_certificate /etc/nginx/ssl/chain.pem;

# ---------- Logging ----------
log_format main '$remote_addr - $remote_user [$time_local] '
                '"$request" $status $body_bytes_sent '
                '"$http_referer" "$http_user_agent" '
                'rt=$request_time uct=$upstream_connect_time urt=$upstream_response_time';

access_log /var/log/nginx/access.log main;
error_log /var/log/nginx/error.log warn;

# ==========================================================
# HTTP -> HTTPS Redirect
# ==========================================================
server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Allow ACME challenge for Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ==========================================================
# HTTPS Server
# ==========================================================
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name _;

    # Connection limits
    limit_conn conn_limit 100;

    # ---------- Security Headers ----------
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' wss: ws:; frame-ancestors 'self';" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ---------- Request Size Limits ----------
    client_max_body_size 50m;
    client_body_buffer_size 128k;

    # ---------- Proxy Defaults ----------
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 10s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
    proxy_buffering on;
    proxy_buffer_size 4k;
    proxy_buffers 8 16k;

    # ---------- CortexDB API ----------
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        limit_req_status 429;

        proxy_pass http://cortex_router/api/;
    }

    location /v1/ {
        limit_req zone=api_limit burst=20 nodelay;
        limit_req_status 429;

        proxy_pass http://cortex_router/v1/;
    }

    # ---------- Health Endpoints ----------
    location /health/ {
        limit_req zone=api_limit burst=50 nodelay;

        proxy_pass http://cortex_router/health/;

        # Allow health checks without auth
        proxy_set_header Authorization "";
    }

    # ---------- WebSocket Support ----------
    location /ws/ {
        proxy_pass http://cortex_router/ws/;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ---------- Dashboard (default) ----------
    location / {
        limit_req zone=static_limit burst=60 nodelay;

        proxy_pass http://cortex_dashboard/;

        # Next.js HMR WebSocket (development)
        location /_next/webpack-hmr {
            proxy_pass http://cortex_dashboard/_next/webpack-hmr;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # Static asset caching
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            proxy_pass http://cortex_dashboard;
            expires 7d;
            add_header Cache-Control "public, immutable";
        }
    }

    # ---------- Error Pages ----------
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}
