# Production Docker Compose
# (c) 2026 Nirlab Inc. All Rights Reserved.
# ============================================================
#
# REPLACES: PostgreSQL + Redis + Pinecone + Neo4j + TimescaleDB + Kafka + Hyperledger
# WITH:     One system, one query language (CortexQL), one dashboard
#
# HARDWARE REQUIREMENTS:
#   Minimum:     2 CPU, 4 GB RAM, 50 GB SSD
#   Recommended: 4 CPU, 16 GB RAM, 200 GB NVMe
#   Enterprise:  8+ CPU, 32+ GB RAM, 500 GB+ NVMe
# ============================================================

version: "3.9"

x-common: &common
  restart: unless-stopped
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

services:
  # ================================================
  # BRAIN REGION: Thalamus + Amygdala + Prefrontal Cortex
  # The CortexDB Router, Security Engine, and Query Optimizer
  # ================================================
  cortex-router:
    <<: *common
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cortex-router
    ports:
      - "5400:5400"    # CortexQL API
      - "5401:5401"    # Health / Metrics
      - "5402:5402"    # Admin / Dashboard API
    environment:
      - CORTEX_MODE=production
      - CORTEX_PORT=5400
      - CORTEX_HEALTH_PORT=5401
      - CORTEX_ADMIN_PORT=5402
      - RELATIONAL_CORE_URL=postgresql://cortex:cortex_secret@relational-core:5432/cortexdb
      - MEMORY_CORE_URL=redis://memory-core:6379/0
      - MEMORY_CORE_PASSWORD=cortex_redis_secret
      - VECTOR_CORE_URL=http://vector-core:6333
      - TEMPORAL_CORE_URL=postgresql://cortex:cortex_secret@relational-core:5432/cortexdb
      - GRAPH_CORE_URL=postgresql://cortex:cortex_secret@relational-core:5432/cortexdb
      - STREAM_CORE_URL=redis://stream-core:6380/0
      - STREAM_CORE_PASSWORD=cortex_stream_secret
      - IMMUTABLE_CORE_PATH=/data/immutable
      - CORTEX_SECRET_KEY=${CORTEX_SECRET_KEY:-change-this-in-production-use-64-char-random}
      - CORTEX_ENABLE_AMYGDALA=true
      - CORTEX_ENABLE_PLASTICITY=true
      - CORTEX_ENABLE_SLEEP_CYCLE=true
      - CORTEX_SLEEP_CYCLE_HOUR=2
    volumes:
      - cortex-immutable:/data/immutable
      - cortex-cache:/data/cache
    depends_on:
      relational-core:
        condition: service_healthy
      memory-core:
        condition: service_healthy
      stream-core:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5401/health/live"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - cortex-net
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M

  # ================================================
  # BRAIN REGION: Neocortex (Long-Term Memory)
  # RelationalCore + TemporalCore + GraphCore
  # PostgreSQL 16 with TimescaleDB + Apache AGE
  # REPLACES: PostgreSQL + Neo4j + TimescaleDB (3->1)
  # ================================================
  relational-core:
    <<: *common
    image: timescale/timescaledb:latest-pg16
    container_name: cortex-relational
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=cortex
      - POSTGRES_PASSWORD=cortex_secret
      - POSTGRES_DB=cortexdb
      - POSTGRES_SHARED_BUFFERS=256MB
      - POSTGRES_EFFECTIVE_CACHE_SIZE=768MB
      - POSTGRES_WORK_MEM=16MB
      - POSTGRES_MAINTENANCE_WORK_MEM=128MB
      - POSTGRES_WAL_BUFFERS=16MB
      - POSTGRES_MAX_CONNECTIONS=200
    volumes:
      - cortex-pg-data:/var/lib/postgresql/data
      - ./init-scripts/relational-core-init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cortex -d cortexdb"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 15s
    networks:
      - cortex-net
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M

  # ================================================
  # BRAIN REGION: Working Memory (Prefrontal Cortex RAM)
  # MemoryCore - Redis 7 (Cache + Sessions + Pub/Sub)
  # REPLACES: Redis + Memcached
  # ================================================
  memory-core:
    <<: *common
    image: redis:7-alpine
    container_name: cortex-memory
    ports:
      - "6379:6379"
    command: >
      redis-server
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
      --save 60 1000
      --save 300 100
      --requirepass cortex_redis_secret
    volumes:
      - cortex-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "cortex_redis_secret", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3
    networks:
      - cortex-net
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 768M
        reservations:
          cpus: "0.25"
          memory: 256M

  # ================================================
  # BRAIN REGION: Thalamic Relay (Event Streaming)
  # StreamCore - Redis instance #2 for Streams + Pub/Sub
  # REPLACES: Kafka (for MVP/Growth tier)
  # ================================================
  stream-core:
    <<: *common
    image: redis:7-alpine
    container_name: cortex-stream
    ports:
      - "6380:6380"
    command: >
      redis-server
      --port 6380
      --maxmemory 256mb
      --maxmemory-policy noeviction
      --appendonly yes
      --appendfsync everysec
      --requirepass cortex_stream_secret
    volumes:
      - cortex-stream-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6380", "-a", "cortex_stream_secret", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3
    networks:
      - cortex-net
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 384M

  # ================================================
  # BRAIN REGION: Hippocampus (Pattern Completion)
  # VectorCore - Qdrant (self-hosted vector DB)
  # REPLACES: Pinecone
  # ================================================
  vector-core:
    <<: *common
    image: qdrant/qdrant:latest
    container_name: cortex-vector
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - cortex-vector-data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
      - QDRANT__SERVICE__HTTP_PORT=6333
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - cortex-net
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M

  # GraphCore runs INSIDE relational-core as Apache AGE extension
  # TemporalCore runs INSIDE relational-core as TimescaleDB extension
  # No separate containers needed

  # ================================================
  # DASHBOARD: CortexDB Admin UI
  # ================================================
  cortex-dashboard:
    <<: *common
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: cortex-dashboard
    ports:
      - "3400:3000"
    environment:
      - CORTEX_API_URL=http://cortex-router:5400
      - CORTEX_ADMIN_URL=http://cortex-router:5402
    depends_on:
      - cortex-router
    networks:
      - cortex-net
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

volumes:
  cortex-pg-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${CORTEX_DATA_PATH:-./data}/postgresql
  cortex-redis-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${CORTEX_DATA_PATH:-./data}/redis
  cortex-stream-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${CORTEX_DATA_PATH:-./data}/stream
  cortex-vector-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${CORTEX_DATA_PATH:-./data}/vector
  cortex-immutable:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${CORTEX_DATA_PATH:-./data}/immutable
  cortex-cache:
    driver: local

networks:
  cortex-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/24
