# Prometheus Configuration for CortexDB
# Scrapes /health/metrics from CortexDB Router every 15s

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'cortexdb-router'
    static_configs:
      - targets: ['cortex-router:5400']
    metrics_path: '/health/metrics'

  - job_name: 'otel-collector'
    static_configs:
      - targets: ['cortex-otel:8889']

  - job_name: 'relational-core'
    static_configs:
      - targets: ['cortex-relational:5432']
    # PostgreSQL exporter would be needed for DB metrics

  - job_name: 'memory-core'
    static_configs:
      - targets: ['cortex-memory:6379']
    # Redis exporter would be needed for Redis metrics
