apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    orgId: 1
    uid: cortexdb-prometheus
    url: http://prometheus:9090
    isDefault: true
    editable: true
    jsonData:
      timeInterval: '15s'
      httpMethod: POST
    version: 1

  - name: Loki
    type: loki
    access: proxy
    orgId: 1
    uid: cortexdb-loki
    url: http://loki:3100
    isDefault: false
    editable: true
    version: 1

  - name: Tempo
    type: tempo
    access: proxy
    orgId: 1
    uid: cortexdb-tempo
    url: http://tempo:3200
    isDefault: false
    editable: true
    version: 1
